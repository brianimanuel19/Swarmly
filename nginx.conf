server {
    listen 80;
    server_name swarmly.amices.com.vn;

    # OAuth callback — allow HTTP so browser redirects from claude.ai land here
    # without an extra HTTPS hop that could lose query params in some configs
    location /oauth/callback {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
    }

    # Everything else: redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name swarmly.amices.com.vn;

    ssl_certificate        /etc/ssl/cert_production.pem;
    ssl_certificate_key    /etc/ssl/key_production.pem;
    ssl_client_certificate /etc/ssl/cloudflare.crt;

    # 'optional' lets us skip the Cloudflare cert check per-location
    # while still enforcing it everywhere else
    ssl_verify_client      optional;

    # OAuth callback — no Cloudflare cert required.
    # The redirect comes from the user's browser (sent by claude.ai), not Cloudflare.
    location /oauth/callback {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Dashboard API + SSE — require Cloudflare Authenticated Origin Pull
    location / {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — keep connection alive
        proxy_set_header   Connection        '';
        proxy_buffering                      off;
        proxy_cache                          off;
        proxy_read_timeout                   3600s;
    }
}
